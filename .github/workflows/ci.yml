name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # build must run before typecheck so mcp-gateway's tsc can resolve
      # @swarmclawai/mcp-core type declarations from the sibling package's dist/.
      - run: pnpm run build
      - run: pnpm run typecheck
      - run: pnpm run test
